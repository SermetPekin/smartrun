name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run tests
        run: |
          uv run pytest -v --tb=short

      - name: Run timeout tests
        run: |
          uv run pytest smartrun/tests/test_timeout.py -v

      - name: Run notebook timeout tests
        run: |
          uv run pytest smartrun/tests/test_nb_timeout.py -v

      - name: Run HTML parameter tests
        run: |
          uv run pytest smartrun/tests/test_html_parameter.py -v

      - name: Run CLI tests
        run: |
          uv run pytest smartrun/tests/test_cli3.py -v

      - name: Run examples
        run: |
          uv run python examples/t1.py
          uv run python examples/t2.py
          uv run python examples/t3.py

      - name: Upload coverage reports (optional)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
